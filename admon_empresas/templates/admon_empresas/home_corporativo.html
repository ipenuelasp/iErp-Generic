{% extends "admon_empresas/dashboard.html" %}
{% load static %}

{% block main_content %}
<div class="flex flex-col items-center justify-center min-h-[70vh] animate-fade-in">
    {% if empresa.logo %}
        <img src="{{ empresa.logo.url }}" alt="{{ empresa.nombre_fiscal }}" class="max-w-xs h-auto drop-shadow-2xl mb-8">
    {% else %}
        <img src="{% static 'img/iErp_4k_sinfondo.png' %}" alt="iErp" class="max-w-xs h-auto drop-shadow-xl mb-8">
    {% endif %}
    <h1 class="text-4xl font-black text-slate-800 italic uppercase tracking-tighter">
        Bienvenido a <span class="text-brand">{{ empresa.nombre_fiscal|default:"iErp" }}</span>
    </h1>
    <p class="text-slate-400 mt-2 font-medium">Selecciona una opción del menú para comenzar.</p>
</div>
{% endblock %}
