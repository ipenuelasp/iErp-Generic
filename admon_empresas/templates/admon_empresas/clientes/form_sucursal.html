{% extends "admon_empresas/dashboard.html" %}
{% block title %}Nueva Sucursal{% endblock %}

{% block main_content %}
<div class="max-w-lg mx-auto">

    <div class="flex items-center gap-3 mb-6">
        <a href="{% url 'lista_clientes' %}" class="text-slate-400 hover:text-slate-600 transition-colors">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div>
            <h1 class="text-2xl font-black text-slate-800">Nueva Sucursal</h1>
            <p class="text-sm text-slate-400 mt-0.5">Empresa: <span class="font-semibold text-slate-600">{{ empresa.nombre_fiscal }}</span></p>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Nombre de la sucursal *</label>
                <input type="text" name="nombre" required
                       placeholder="Ej. Corporativo, Planta Norte, CDMX..."
                       class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand focus:border-brand outline-none text-sm transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Código *
                    <span class="text-xs font-normal text-slate-400 ml-1">— clave corta para integraciones</span>
                </label>
                <input type="text" name="codigo_sucursal" required
                       placeholder="Ej. MATRIZ, NORTE, CDMX"
                       class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand focus:border-brand outline-none text-sm transition-all uppercase">
            </div>

            <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-xl border border-slate-200">
                <input type="checkbox" name="es_matriz" id="es_matriz"
                       class="w-4 h-4 rounded accent-brand">
                <label for="es_matriz" class="text-sm font-semibold text-slate-700 cursor-pointer">
                    Es la sucursal matriz
                    <span class="block text-xs font-normal text-slate-400">Se usará como sede principal al iniciar sesión</span>
                </label>
            </div>

            {% if messages %}
                {% for msg in messages %}
                <div class="p-3 rounded-xl text-sm font-medium bg-red-50 text-red-700 border border-red-200">{{ msg }}</div>
                {% endfor %}
            {% endif %}

            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="flex-1 bg-brand text-white font-bold py-3 rounded-xl hover:opacity-90 transition-all text-sm">
                    Crear sucursal
                </button>
                <a href="{% url 'lista_clientes' %}"
                   class="flex-1 text-center border border-slate-200 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-50 transition-all text-sm">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
