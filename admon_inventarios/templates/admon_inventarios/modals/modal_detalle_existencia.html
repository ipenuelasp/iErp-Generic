<div id="modal-detalle-stock" class="fixed inset-0 z-[120] hidden overflow-y-auto">
    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="cerrarDetalle()"></div>
    <div class="relative min-h-screen flex items-center justify-center p-4">
        <div class="relative bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl p-10 border border-slate-100 transform transition-all">
            
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h3 id="modal-prod-nombre" class="text-xl font-black text-slate-800 uppercase italic tracking-tight">Detalle de Ubicaciones</h3>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest italic mt-1">Desglose de existencias por almacén, lote o serie</p>
                </div>
                <button onclick="cerrarDetalle()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-50 text-slate-400 transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <div class="overflow-hidden rounded-[2rem] border border-slate-100 shadow-sm">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-[9px] font-black text-slate-400 uppercase tracking-[0.15em]">
                        <tr>
                            <th class="px-6 py-4">Almacén / Ubicación</th>
                            <th class="px-6 py-4 text-center">Trazabilidad (Lote/Serie)</th>
                            <th class="px-6 py-4 text-right">Cantidad</th>
                        </tr>
                    </thead>
                    <tbody id="lista-detalle-ubicacion" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>

            <div class="mt-8 flex justify-end">
                <button onclick="cerrarDetalle()" class="bg-slate-900 text-white px-8 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg hover:bg-brand transition-all">
                    Cerrar Vista
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    function verDetalleUbicacion(id, nombre) {
        document.getElementById('modal-prod-nombre').innerText = nombre;
        const tbody = document.getElementById('lista-detalle-ubicacion');
        tbody.innerHTML = '';

        // Filtramos el array global detalleGlobalJS
        const filtrados = detalleGlobalJS.filter(d => d.prod_id === id);

        if (filtrados.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="3" class="py-12 text-center text-slate-400 font-bold italic text-xs uppercase tracking-widest">
                        No hay existencias detalladas para este producto
                    </td>
                </tr>`;
        }

        filtrados.forEach(d => {
            let etiquetaTrazabilidad = '';
            
            // Prioridad de visualización: Serie > Lote > Sin Traza
            if (d.serie && d.serie !== 'None' && d.serie !== '') {
                etiquetaTrazabilidad = `
                    <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-[9px] font-black uppercase inline-flex items-center">
                        <i class="fa-solid fa-barcode mr-1.5 text-[11px]"></i> S/N: ${d.serie}
                    </span>`;
            } else if (d.lote && d.lote !== 'None' && d.lote !== '' && d.lote !== 'SIN LOTE') {
                etiquetaTrazabilidad = `
                    <span class="bg-slate-100 text-slate-500 px-3 py-1 rounded-lg text-[9px] font-black uppercase inline-flex items-center">
                        <i class="fa-solid fa-box-archive mr-1.5 text-[10px]"></i> LOTE: ${d.lote}
                    </span>`;
            } else {
                etiquetaTrazabilidad = `
                    <span class="text-[9px] font-bold text-slate-300 italic uppercase tracking-tighter">
                        Sin Trazabilidad
                    </span>`;
            }

            tbody.innerHTML += `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="px-6 py-4">
                        <p class="font-black text-slate-700 uppercase italic text-[11px]">${d.almacen}</p>
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${d.ubicacion}</p>
                    </td>
                    <td class="px-6 py-4 text-center">
                        ${etiquetaTrazabilidad}
                    </td>
                    <td class="px-6 py-4 text-right font-black text-brand italic text-sm">
                        ${d.cantidad}
                    </td>
                </tr>
            `;
        });

        document.getElementById('modal-detalle-stock').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function cerrarDetalle() {
        document.getElementById('modal-detalle-stock').classList.add('hidden');
        document.body.style.overflow = 'auto';
    }
</script>
