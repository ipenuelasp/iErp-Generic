<div id="modal-trazabilidad" class="fixed inset-0 z-[120] hidden overflow-y-auto">
    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="cerrarModalTrazabilidad()"></div>
    
    <div class="relative min-h-screen flex items-center justify-center p-4">
        <div class="relative bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl p-10 border border-slate-100 transition-all transform">
            
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h3 id="traza-titulo" class="text-xl font-black text-slate-800 uppercase italic tracking-tight">Configurar Trazabilidad</h3>
                    <p id="traza-subtitulo" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest italic mt-1"></p>
                </div>
                <button type="button" onclick="cerrarModalTrazabilidad()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-50 text-slate-400 transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <div id="traza-contenido" class="space-y-6 py-4">
                </div>

            <div class="mt-8 pt-6 border-t border-slate-100 flex justify-end items-center gap-4">
                <button type="button" onclick="cerrarModalTrazabilidad()" 
                    class="text-[10px] font-black uppercase text-slate-400 px-6 py-3 hover:text-slate-600 transition-all italic">
                    Cancelar
                </button>
                <button type="button" onclick="guardarTrazabilidad()" 
                    class="bg-brand text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl shadow-brand/20 hover:-translate-y-1 active:scale-95 transition-all">
                    Aplicar a Partida
                </button>
            </div>
        </div>
    </div>
</div>

<script>
let filaActual = null;

function abrirTrazabilidad(btn) {
    filaActual = btn.closest('tr');
    const productoNom = filaActual.dataset.nombre;
    const inputCant = filaActual.querySelector('.input-cantidad');
    const cantidad = parseFloat(inputCant.value);
    
    const esLote = filaActual.dataset.lote === 'True';
    const esSerie = filaActual.dataset.serie === 'True';

    if (isNaN(cantidad) || cantidad <= 0) {
        alert("Primero ingresa una cantidad mayor a 0 para recibir.");
        inputCant.focus();
        return;
    }

    // Actualizar Textos
    document.getElementById('traza-titulo').innerText = productoNom;
    const contenido = document.getElementById('traza-contenido');
    contenido.innerHTML = '';

    if (esLote) {
        document.getElementById('traza-subtitulo').innerText = "Registro de Lote y Caducidad";
        contenido.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase italic ml-2">Número de Lote</label>
                    <input type="text" id="traza-lote-num" required
                        class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-sm focus:border-brand outline-none transition-all"
                        placeholder="Ej: LOT-2024-001">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase italic ml-2">Fecha de Caducidad</label>
                    <input type="date" id="traza-lote-fec" 
                        class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-sm focus:border-brand outline-none transition-all">
                </div>
            </div>`;
    } else if (esSerie) {
        document.getElementById('traza-subtitulo').innerText = `Captura de ${cantidad} Números de Serie Únicos`;
        let inputsSeries = '<div class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[40vh] overflow-y-auto pr-2 custom-scroll">';
        for (let i = 1; i <= cantidad; i++) {
            inputsSeries += `
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[9px] font-black text-slate-300">#${i}</span>
                    <input type="text" required placeholder="S/N..." 
                        class="input-serie-item w-full pl-10 pr-4 py-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-[11px] focus:border-brand outline-none transition-all">
                </div>`;
        }
        inputsSeries += '</div>';
        contenido.innerHTML = inputsSeries;
    }

    document.getElementById('modal-trazabilidad').classList.remove('hidden');
}

function cerrarModalTrazabilidad() {
    document.getElementById('modal-trazabilidad').classList.add('hidden');
}

function guardarTrazabilidad() {
    const esLote = filaActual.dataset.lote === 'True';
    const contenedorOculto = filaActual.querySelector('.datos-trazabilidad-ocultos');
    const detId = filaActual.dataset.id;
    
    contenedorOculto.innerHTML = '';

    if (esLote) {
        const lote = document.getElementById('traza-lote-num').value;
        const fecha = document.getElementById('traza-lote-fec').value;
        
        if(!lote) { alert("El número de lote es obligatorio."); return; }

        contenedorOculto.innerHTML = `
            <input type="hidden" name="lote_num_${detId}" value="${lote}">
            <input type="hidden" name="lote_fec_${detId}" value="${fecha}">
        `;
    } else {
        const series = document.querySelectorAll('.input-serie-item');
        let completas = true;
        series.forEach(s => {
            if(!s.value) completas = false;
            contenedorOculto.innerHTML += `<input type="hidden" name="series_${detId}[]" value="${s.value}">`;
        });
        if(!completas) { alert("Debes capturar todos los números de serie."); return; }
    }
    
    // Feedback visual en la tabla
    const btn = filaActual.querySelector('.btn-traza');
    btn.classList.remove('bg-slate-100', 'text-slate-400');
    btn.classList.add('bg-emerald-500', 'text-white', 'shadow-emerald-200');
    btn.innerHTML = '<i class="fa-solid fa-check-double text-lg"></i>';
    
    cerrarModalTrazabilidad();
}
</script>

<style>
    .custom-scroll::-webkit-scrollbar { width: 5px; }
    .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
</style>
