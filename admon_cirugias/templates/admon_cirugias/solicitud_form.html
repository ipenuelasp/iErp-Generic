{% extends "admon_empresas/dashboard.html" %}

{% block main_content %}
<div class="max-w-3xl mx-auto p-8">
    <div class="mb-10 flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight italic uppercase">Nueva Solicitud de Cirugía</h1>
            <p class="text-slate-500 mt-2 font-medium">Sede <span class="text-brand">{{ sucursal_activa.nombre }}</span></p>
        </div>
        <a href="{% url 'admon_cirugias:solicitudes' %}" class="text-[10px] font-black uppercase text-slate-400 hover:text-slate-600"><i class="fa-solid fa-arrow-left mr-2"></i> Volver</a>
    </div>

    <form method="POST" class="bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 p-10 space-y-5">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-4">
            <div class="space-y-1"><label class="lbl">Paciente (referencia)</label><input name="paciente"></div>
            <div class="space-y-1"><label class="lbl">Fecha de cirugía</label><input type="date" name="fecha_cirugia"></div>
            <div class="space-y-1"><label class="lbl">Doctor</label>
                <select name="doctor"><option value="">— Seleccionar —</option>{% for d in doctores %}<option value="{{ d.id }}">{{ d.nombre }}</option>{% endfor %}</select>
            </div>
            <div class="space-y-1"><label class="lbl">Hospital</label>
                <select name="hospital"><option value="">— Seleccionar —</option>{% for h in hospitales %}<option value="{{ h.id }}">{{ h.nombre }}</option>{% endfor %}</select>
            </div>
            <div class="space-y-1 col-span-2"><label class="lbl">Cliente a facturar</label>
                <select name="cliente"><option value="">— Seleccionar —</option>{% for c in clientes %}<option value="{{ c.id }}">{{ c }}</option>{% endfor %}</select>
            </div>
            <div class="space-y-1 col-span-2"><label class="lbl">Comentario</label><textarea name="comentario" rows="3"></textarea></div>
        </div>
        <div class="pt-4 border-t border-slate-50 flex justify-end">
            <button type="submit" class="bg-brand text-white font-black py-4 px-10 rounded-2xl text-xs uppercase tracking-widest shadow-lg shadow-brand/20 hover:-translate-y-1 transition-all">Crear Solicitud</button>
        </div>
    </form>
</div>
<style>.lbl{font-size:10px;font-weight:900;color:#94a3b8;text-transform:uppercase;margin-left:4px}
input,select,textarea{width:100%;padding:0.85rem 1rem;background:#f8fafc;border:1px solid #e2e8f0;border-radius:1rem;outline:none;font-weight:600;color:#334155;font-size:0.8rem}
input:focus,select:focus,textarea:focus{border-color:var(--brand-color);background:#fff;box-shadow:0 0 0 4px rgba(0,171,241,0.1)}</style>
{% endblock %}
