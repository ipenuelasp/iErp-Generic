<div style="font-family: sans-serif; max-width: 600px; margin: auto; border: 1px solid #eee; border-radius: 20px; padding: 40px;">
    <h2 style="color: #6366f1;">¡Bienvenido a iErp!</h2>
    <p>Hola <strong>{{ nombre }}</strong>,</p>
    <p>Has sido dado de alta en la plataforma. Estas son tus credenciales:</p>
    <div style="background: #f8fafc; padding: 20px; border-radius: 15px; margin: 20px 0;">
        <p style="margin: 5px 0;"><strong>Usuario:</strong> {{ username }}</p>
        <p style="margin: 5px 0;"><strong>Contraseña temporal:</strong> {{ username }}</p>
    </div>
    <a href="{{ url_login }}" style="background: #6366f1; color: white; padding: 12px 25px; text-decoration: none; border-radius: 10px; display: inline-block;">
        Iniciar Sesión
    </a>
</div>
