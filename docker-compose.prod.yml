# iErp SaaS — Opción A (un solo servicio, BD compartida) detrás de Traefik.
# Traefik (deploy/traefik) emite el cert wildcard *.ierp.mx y enruta TODOS
# los subdominios a esta app; el tenant se resuelve por subdominio en la app.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: ierp-app:latest
    container_name: ierp_app
    restart: always
    env_file: .env
    volumes:
      - /var/www/ierp/media:/app/media
      - /var/www/ierp/staticfiles:/app/staticfiles
      - ./logs:/app/logs
    networks:
      - web
    labels:
      - traefik.enable=true
      # Todos los subdominios *.ierp.mx + el dominio raíz pegan a esta app
      - "traefik.http.routers.ierp.rule=HostRegexp(`^.+\\.ierp\\.mx$`) || Host(`ierp.mx`)"
      - traefik.http.routers.ierp.entrypoints=websecure
      - traefik.http.routers.ierp.tls.certresolver=le
      - "traefik.http.routers.ierp.tls.domains[0].main=ierp.mx"
      - "traefik.http.routers.ierp.tls.domains[0].sans=*.ierp.mx"
      - traefik.http.services.ierp.loadbalancer.server.port=8000

networks:
  web:
    external: true
