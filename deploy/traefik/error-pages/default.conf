# Página de mantenimiento por empresa (según el subdominio).
# Traefik conserva el código de estado original (502/503/504); este nginx
# solo entrega el contenido. Lo usa el middleware 'errors' (app arriba pero
# respondiendo 5xx) y el router catch-all (app totalmente caída).
#
# Para asignar tema a una empresa, agrega su subdominio aquí. El default es
# 'robot' (formal/médico). Debe coincidir con el campo "Tema de error" que la
# empresa tenga en Ajustes (eso controla las páginas de error de la app viva).
map $host $tema_file {
    default              /maintenance_robot.html;
    ~*^phanalytics\.     /maintenance_alien.html;
    ~*^ph\.              /maintenance_alien.html;
    ~*^ipenuelas\.       /maintenance_alien.html;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # El middleware de Traefik pide /maintenance.html → servimos el tema del host.
    location = /maintenance.html {
        try_files $tema_file =503;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
    location / {
        try_files $uri $tema_file;
    }
}
