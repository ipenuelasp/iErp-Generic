# Sirve la página de mantenimiento para CUALQUIER ruta.
# Traefik conserva el código de estado original (502/503/504); este nginx
# solo entrega el contenido. Usado tanto por el middleware 'errors' (app
# arriba pero respondiendo 5xx) como por el router catch-all (app caída).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location / {
        try_files $uri /maintenance.html;
    }

    # Evita cachear la página de mantenimiento
    location = /maintenance.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
}
