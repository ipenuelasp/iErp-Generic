<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="10">
    <title>Volvemos en un momento · iErp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(180deg, #f4f8fc, #e8eef6); color: #1f3050;
            min-height: 100%; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 2rem; overflow: hidden;
        }
        .card { max-width: 560px; }
        .scene { width: 240px; height: 240px; margin: 0 auto 1.2rem; position: relative; }
        .robot { position:absolute; left:50%; bottom:14px; transform:translateX(-50%); animation: rbob 3s ease-in-out infinite; }
        @keyframes rbob { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-8px)} }
        .gear { transform-origin:center; animation: spin 6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg) } }
        .scan { animation: scan 2.2s ease-in-out infinite; }
        @keyframes scan { 0%,100%{opacity:.3} 50%{opacity:1} }
        h1 { font-size: 1.7rem; font-weight: 800; letter-spacing:-.02em; margin-bottom:.6rem; }
        p { color:#5a6b85; font-size:1rem; line-height:1.5; }
        .badge { display:inline-flex; align-items:center; gap:.5rem; margin-top:1.4rem;
                 background:#e3edf9; border:1px solid #c5d8ef; color:#1f4e79;
                 padding:.55rem 1rem; border-radius:999px; font-size:.8rem; font-weight:600; }
        .dot { width:8px; height:8px; border-radius:50%; background:#1d9e75;
               box-shadow:0 0 8px rgba(29,158,117,.5); animation: blink 1.2s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
        .brand { margin-top:2rem; font-size:.72rem; letter-spacing:.25em; color:#94a3b8; text-transform:uppercase; font-weight:700; }
    </style>
</head>
<body>
    <div class="card">
        <div class="scene">
            <svg class="robot" width="190" height="200" viewBox="0 0 190 200" xmlns="http://www.w3.org/2000/svg">
                <line x1="95" y1="34" x2="95" y2="16" stroke="#9bb4d4" stroke-width="4"/>
                <circle cx="95" cy="12" r="6" fill="#1d9e75"/>
                <rect x="48" y="34" width="94" height="74" rx="20" fill="#dbe7f5" stroke="#b9cde6" stroke-width="2"/>
                <rect x="60" y="48" width="70" height="46" rx="12" fill="#16263f"/>
                <circle class="scan" cx="83" cy="71" r="7" fill="#39c0ff"/>
                <circle class="scan" cx="107" cy="71" r="7" fill="#39c0ff"/>
                <path d="M84 84 Q95 90 106 84" stroke="#39c0ff" stroke-width="3" fill="none" stroke-linecap="round"/>
                <rect x="58" y="112" width="74" height="64" rx="16" fill="#cdddf0" stroke="#b9cde6" stroke-width="2"/>
                <g transform="translate(95,144)">
                    <g class="gear">
                        <circle r="15" fill="none" stroke="#1f4e79" stroke-width="6"/>
                        <g fill="#1f4e79">
                            <rect x="-3" y="-22" width="6" height="8"/><rect x="-3" y="14" width="6" height="8"/>
                            <rect x="-22" y="-3" width="8" height="6"/><rect x="14" y="-3" width="8" height="6"/>
                            <rect x="-17" y="-17" width="6" height="7" transform="rotate(45)"/>
                            <rect x="-17" y="-17" width="6" height="7" transform="rotate(-45)"/>
                        </g>
                    </g>
                </g>
                <rect x="30" y="120" width="20" height="44" rx="9" fill="#dbe7f5" stroke="#b9cde6" stroke-width="2"/>
                <rect x="140" y="120" width="20" height="44" rx="9" fill="#dbe7f5" stroke="#b9cde6" stroke-width="2"/>
                <g transform="translate(150,108)">
                    <rect x="-10" y="-10" width="20" height="20" rx="5" fill="#e24b4a"/>
                    <rect x="-3" y="-7" width="6" height="14" fill="#fff"/><rect x="-7" y="-3" width="14" height="6" fill="#fff"/>
                </g>
            </svg>
        </div>
        <h1>Estamos en mantenimiento</h1>
        <p>Estamos aplicando una actualización del sistema.<br>
           En unos momentos el servicio vuelve a estar disponible.</p>
        <div class="badge"><span class="dot"></span> Reconectando automáticamente…</div>
        <div class="brand">iErp · Sistema de Gestión</div>
    </div>
</body>
</html>
