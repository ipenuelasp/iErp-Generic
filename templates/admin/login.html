<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iErp | Acceso Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at center, #f8fafc 0%, #e2e8f0 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        
        <div class="bg-white/80 backdrop-blur-lg rounded-[2.5rem] shadow-2xl shadow-slate-300/50 border border-white p-10">
            <div class="text-center mb-10">
                <div class="flex justify-center mb-10">
                    <img src="/static/img/iErp_4k_sinfondo.png" alt="iErp Logo" class="h-20 w-auto object-contain drop-shadow-md">
                </div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Global Admin</h1>
                <p class="text-slate-500 font-medium mt-2">Gestión Empresarial Inteligente</p>
            </div>

            <form method="post" action="{{ app_path }}" class="space-y-6">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="bg-red-50 text-red-600 p-4 rounded-2xl text-xs font-bold border border-red-100 flex items-center">
                    <i class="fa-solid fa-circle-exclamation mr-2"></i>
                    Usuario o contraseña incorrectos.
                </div>
                {% endif %}

                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Usuario</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fa-solid fa-user-ninja"></i>
                        </span>
                        <input type="text" name="username" required
                            class="w-full pl-12 pr-4 py-4 bg-slate-50/50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-cyan-500/10 focus:border-brand outline-none transition-all text-slate-700 font-medium">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fa-solid fa-shield-halved"></i>
                        </span>
                        <input type="password" name="password" required
                            class="w-full pl-12 pr-4 py-4 bg-slate-50/50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-cyan-500/10 focus:border-brand outline-none transition-all text-slate-700 font-medium">
                    </div>
                </div>

                <button type="submit" 
                    class="w-full bg-[#00ABF1] hover:bg-[#0096d4] text-white font-black py-4 rounded-2xl shadow-xl shadow-cyan-200 transition-all transform hover:-translate-y-1 active:scale-95 flex items-center justify-center space-x-3 text-sm uppercase tracking-wider">
                    <span>Entrar al Sistema</span>
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </form>
        </div>

        <p class="text-center mt-10 text-slate-400 text-[10px] font-bold uppercase tracking-widest">
            &copy; 2026 iErp Software Center
        </p>
    </div>

</body>
</html>
